<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Protetto - Il Mestiere del Sindaco</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            overflow: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .login-container {
            max-width: 400px;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #00f0ff, #ff00d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        p {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 14px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #00f0ff;
            box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00f0ff, #00b3c3);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.4);
        }
        .error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        .protected-content {
            display: none;
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            background: white;
            color: black;
        }
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: none;
        }
        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="back-link" id="backLink">
        <a href="/">&larr; Torna alla Home</a>
    </div>

    <div class="login-container" id="loginContainer">
        <h1>Accesso Protetto</h1>
        <p>Questo contenuto è riservato. Inserisci la password per accedere.</p>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Sii paziente..." autocomplete="off">
        </div>
        <button id="submitBtn">Accedi</button>
        <div class="error" id="error">Password errata. Riprova.</div>
    </div>

    <div class="protected-content" id="protectedContent"></div>

    <script>
        const correctPassword = "G14nluc4";
        const loginContainer = document.getElementById('loginContainer');
        const protectedContent = document.getElementById('protectedContent');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('error');
        const backLink = document.getElementById('backLink');

        async function loadContent() {
            try {
                const response = await fetch('ooindex.html.bak');
                const html = await response.text();
                protectedContent.innerHTML = html;
            } catch (e) {
                protectedContent.innerHTML = '<div style="padding:2rem; color:black;">Errore nel caricamento del contenuto.</div>';
            }
        }

        function checkPassword() {
            if (passwordInput.value === correctPassword) {
                sessionStorage.setItem('ooindex_auth', 'true');
                showContent();
            } else {
                errorDiv.style.display = 'block';
            }
        }

        function showContent() {
            loginContainer.style.display = 'none';
            backLink.style.display = 'block';
            protectedContent.style.display = 'block';
            loadContent();
        }

        if (sessionStorage.getItem('ooindex_auth') === 'true') {
            showContent();
        }

        submitBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', e => { if(e.key === 'Enter') checkPassword(); });
    </script>
</body>
</html>
